aid: oracle-e-business-suite
name: Oracle E-Business Suite
description: >-
  A collection of APIs for Oracle E-Business Suite (EBS), Oracle's comprehensive
  suite of integrated, global business applications that supports today's evolving
  business models across financials, human capital management, supply chain, and
  manufacturing.
