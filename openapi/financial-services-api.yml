  /ce/bankAccounts:
    get:
      operationId: getBankAccounts
      summary: Retrieve Bank Accounts
      description: >-
        Retrieves Cash Management bank account records. Maps to the
        CE_BANK_ACCOUNTS table through the Cash Management APIs.
      tags:
      - Cash Management
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: bankAccountId
        in: query
        description: Bank account identifier
        schema:
          type: integer
        example: '500123'
      - name: bankAccountName
        in: query
        description: Bank account name
        schema:
          type: string
        example: example_value
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of bank accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankAccount'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getbankaccounts200Example:
                  summary: Default getBankAccounts 200 response
