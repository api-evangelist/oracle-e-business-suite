openapi: 3.1.0
info:
  title: Oracle EBS Supply Chain Management API
  description: >-
    RESTful APIs for Oracle E-Business Suite supply chain management modules
    including Purchasing, Order Management, Inventory, and Logistics. These
    PL/SQL APIs are deployed as REST services through the Integrated SOA Gateway.
  version: 12.2.0
  contact:
    name: Oracle Support
    email: support@oracle.com
    url: https://support.oracle.com
  license:
    name: Oracle Proprietary
    url: https://www.oracle.com/legal/terms/
  x-logo:
    url: https://www.oracle.com/a/ocom/img/oracle-logo.svg
servers:
- url: https://{instance}.oracle.com/webservices/rest
  description: Oracle EBS ISG REST endpoint
  variables:
    instance:
      default: ebs-host
      description: The Oracle EBS instance hostname
paths:
  /po/purchaseOrders:
    get:
      operationId: getPurchaseOrders
      summary: Retrieve Purchase Orders
      description: >-
        Retrieves purchase order records. Maps to the PO_HEADERS_ALL,
        PO_LINES_ALL, PO_LINE_LOCATIONS_ALL, and PO_DISTRIBUTIONS_ALL tables
        through the PO_PURCHASE_ORDERS_PKG PL/SQL API.
      tags:
      - Purchasing
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: poHeaderId
        in: query
        description: Purchase order header identifier
        schema:
          type: integer
        example: '500123'
      - name: segment1
        in: query
        description: Purchase order number
        schema:
          type: string
        example: example_value
      - name: vendorId
        in: query
        description: Supplier/vendor identifier
        schema:
          type: integer
        example: '500123'
      - name: authorizationStatus
        in: query
        description: Authorization status
        schema:
          type: string
          enum:
          - APPROVED
          - IN PROCESS
          - INCOMPLETE
          - PRE-APPROVED
          - REJECTED
          - REQUIRES REAPPROVAL
        example: APPROVED
      - name: creationDateFrom
        in: query
        description: Creation date range start (YYYY-MM-DD)
        schema:
          type: string
          format: date
        example: '2026-01-15'
      - name: creationDateTo
        in: query
        description: Creation date range end (YYYY-MM-DD)
        schema:
          type: string
          format: date
        example: '2026-01-15'
      - name: typeLookupCode
        in: query
        description: Purchase order type
        schema:
          type: string
          enum:
          - STANDARD
          - BLANKET
          - CONTRACT
          - PLANNED
        example: STANDARD
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PurchaseOrder'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getpurchaseorders200Example:
                  summary: Default getPurchaseOrders 200 response
                  x-microcks-default: true
                  value:
                    items:
                    - poHeaderId: '500123'
                      segment1: example_value
                      typeLookupCode: STANDARD
                      vendorId: '500123'
                      vendorName: example_value
                      vendorSiteId: '500123'
                      currencyCode: example_value
                      authorizationStatus: APPROVED
                      approvedFlag: 'Y'
                      closedCode: OPEN
                      totalAmount: 42.5
                      creationDate: '2026-01-15T10:30:00Z'
                      approvedDate: '2026-01-15'
                      buyerId: '500123'
                      shipToLocationId: '500123'
                      billToLocationId: '500123'
                      termsId: '500123'
                      description: A sample description.
                      lines:
                      - {}
                      orgId: '500123'
                      lastUpdateDate: '2026-01-15T10:30:00Z'
                    totalCount: 10
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createPurchaseOrder
      summary: Create a Purchase Order
      description: >-
        Creates a new purchase order. Uses the PO_HEADERS_INTERFACE,
        PO_LINES_INTERFACE, and PO_DISTRIBUTIONS_INTERFACE tables, then
        initiates the Import Standard Purchase Orders concurrent program.
      tags:
      - Purchasing
      security:
      - tokenAuth: []
      - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderCreate'
            examples:
              CreatepurchaseorderRequestExample:
                summary: Default createPurchaseOrder request
                x-microcks-default: true
                value:
                  vendorId: '500123'
                  vendorSiteId: '500123'
                  currencyCode: example_value
                  typeLookupCode: example_value
                  description: A sample description.
                  buyerId: '500123'
                  shipToLocationId: '500123'
                  billToLocationId: '500123'
                  termsId: '500123'
                  lines:
                  - lineNum: 10
                    itemId: '500123'
                    itemDescription: example_value
                    categoryId: '500123'
                    quantity: 42.5
                    unitMeasLookupCode: example_value
                    unitPrice: 42.5
                    needByDate: '2026-01-15'
                    shipToOrganizationId: '500123'
      responses:
        '201':
          description: Purchase order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
              examples:
                Createpurchaseorder201Example:
                  summary: Default createPurchaseOrder 201 response
                  x-microcks-default: true
                  value:
                    poHeaderId: '500123'
                    segment1: example_value
                    typeLookupCode: STANDARD
                    vendorId: '500123'
                    vendorName: example_value
                    vendorSiteId: '500123'
                    currencyCode: example_value
                    authorizationStatus: APPROVED
                    approvedFlag: 'Y'
                    closedCode: OPEN
                    totalAmount: 42.5
                    creationDate: '2026-01-15T10:30:00Z'
                    approvedDate: '2026-01-15'
                    buyerId: '500123'
                    shipToLocationId: '500123'
                    billToLocationId: '500123'
                    termsId: '500123'
                    description: A sample description.
                    lines:
                    - poLineId: '500123'
                      lineNum: 10
                      lineType: example_value
                      itemId: '500123'
                      itemDescription: example_value
                      categoryId: '500123'
                      quantity: 42.5
                      unitMeasLookupCode: example_value
                      unitPrice: 42.5
                      amount: 42.5
                      needByDate: '2026-01-15'
                      promisedDate: '2026-01-15'
                      closedCode: example_value
                      shipments: {}
                    orgId: '500123'
                    lastUpdateDate: '2026-01-15T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /po/purchaseOrders/{poHeaderId}:
    get:
      operationId: getPurchaseOrderById
      summary: Retrieve a Specific Purchase Order
      description: Retrieves a purchase order by its header identifier.
      tags:
      - Purchasing
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: poHeaderId
        in: path
        required: true
        schema:
          type: integer
        example: '500123'
      responses:
        '200':
          description: Purchase order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
              examples:
                Getpurchaseorderbyid200Example:
                  summary: Default getPurchaseOrderById 200 response
                  x-microcks-default: true
                  value:
                    poHeaderId: '500123'
                    segment1: example_value
                    typeLookupCode: STANDARD
                    vendorId: '500123'
                    vendorName: example_value
                    vendorSiteId: '500123'
                    currencyCode: example_value
                    authorizationStatus: APPROVED
                    approvedFlag: 'Y'
                    closedCode: OPEN
                    totalAmount: 42.5
                    creationDate: '2026-01-15T10:30:00Z'
                    approvedDate: '2026-01-15'
                    buyerId: '500123'
                    shipToLocationId: '500123'
                    billToLocationId: '500123'
                    termsId: '500123'
                    description: A sample description.
                    lines:
                    - poLineId: '500123'
                      lineNum: 10
                      lineType: example_value
                      itemId: '500123'
                      itemDescription: example_value
                      categoryId: '500123'
                      quantity: 42.5
                      unitMeasLookupCode: example_value
                      unitPrice: 42.5
                      amount: 42.5
                      needByDate: '2026-01-15'
                      promisedDate: '2026-01-15'
                      closedCode: example_value
                      shipments: {}
                    orgId: '500123'
                    lastUpdateDate: '2026-01-15T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updatePurchaseOrder
      summary: Update a Purchase Order
      description: >-
        Updates an existing purchase order. Uses the PO_CHANGE_API1_S
        PL/SQL package for modifications to approved purchase orders.
      tags:
      - Purchasing
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: poHeaderId
        in: path
        required: true
        schema:
          type: integer
        example: '500123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderUpdate'
            examples:
              UpdatepurchaseorderRequestExample:
                summary: Default updatePurchaseOrder request
                x-microcks-default: true
                value:
                  description: A sample description.
                  lines:
                  - poLineId: '500123'
                    quantity: 42.5
                    unitPrice: 42.5
                    needByDate: '2026-01-15'
                    cancelFlag: true
      responses:
        '200':
          description: Purchase order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
              examples:
                Updatepurchaseorder200Example:
                  summary: Default updatePurchaseOrder 200 response
                  x-microcks-default: true
                  value:
                    poHeaderId: '500123'
                    segment1: example_value
                    typeLookupCode: STANDARD
                    vendorId: '500123'
                    vendorName: example_value
                    vendorSiteId: '500123'
                    currencyCode: example_value
                    authorizationStatus: APPROVED
                    approvedFlag: 'Y'
                    closedCode: OPEN
                    totalAmount: 42.5
                    creationDate: '2026-01-15T10:30:00Z'
                    approvedDate: '2026-01-15'
                    buyerId: '500123'
                    shipToLocationId: '500123'
                    billToLocationId: '500123'
                    termsId: '500123'
                    description: A sample description.
                    lines:
                    - poLineId: '500123'
                      lineNum: 10
                      lineType: example_value
                      itemId: '500123'
                      itemDescription: example_value
                      categoryId: '500123'
                      quantity: 42.5
                      unitMeasLookupCode: example_value
                      unitPrice: 42.5
                      amount: 42.5
                      needByDate: '2026-01-15'
                      promisedDate: '2026-01-15'
                      closedCode: example_value
                      shipments: {}
                    orgId: '500123'
                    lastUpdateDate: '2026-01-15T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /po/requisitions:
    get:
      operationId: getRequisitions
      summary: Retrieve Purchase Requisitions
      description: >-
        Retrieves purchase requisition records. Maps to the
        PO_REQUISITION_HEADERS_ALL and PO_REQUISITION_LINES_ALL tables.
      tags:
      - Purchasing
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: requisitionHeaderId
        in: query
        description: Requisition header identifier
        schema:
          type: integer
        example: '500123'
      - name: requisitionNumber
        in: query
        description: Requisition number
        schema:
          type: string
        example: example_value
      - name: authorizationStatus
        in: query
        description: Authorization status
        schema:
          type: string
          enum:
          - APPROVED
          - IN PROCESS
          - INCOMPLETE
          - REJECTED
          - RETURNED
        example: APPROVED
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of requisitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Requisition'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getrequisitions200Example:
                  summary: Default getRequisitions 200 response
                  x-microcks-default: true
                  value:
                    items:
                    - requisitionHeaderId: '500123'
                      segment1: example_value
                      typeLookupCode: PURCHASE
                      authorizationStatus: example_value
                      preparerId: '500123'
                      description: A sample description.
                      totalAmount: 42.5
                      creationDate: '2026-01-15T10:30:00Z'
                      lines:
                      - {}
                      orgId: '500123'
                    totalCount: 10
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /po/suppliers:
    get:
      operationId: getSuppliers
      summary: Retrieve Suppliers
      description: >-
        Retrieves supplier/vendor records. Maps to the AP_SUPPLIERS and
        AP_SUPPLIER_SITES_ALL tables through the AP_VENDOR_PUB_PKG API.
      tags:
      - Purchasing
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: vendorId
        in: query
        description: Vendor identifier
        schema:
          type: integer
        example: '500123'
      - name: vendorName
        in: query
        description: Vendor name (supports wildcards)
        schema:
          type: string
        example: example_value
      - name: segment1
        in: query
        description: Vendor number
        schema:
          type: string
        example: example_value
      - name: vendorType
        in: query
        description: Vendor type
        schema:
          type: string
        example: example_value
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of suppliers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Supplier'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getsuppliers200Example:
                  summary: Default getSuppliers 200 response
                  x-microcks-default: true
                  value:
                    items:
                    - vendorId: '500123'
                      vendorName: example_value
                      segment1: example_value
                      vendorType: example_value
                      taxPayerId: '500123'
                      standardIndustryClass: example_value
                      paymentCurrencyCode: example_value
                      paymentMethodCode: example_value
                      termsId: '500123'
                      enabled: true
                      startDateActive: '2026-01-15'
                      endDateActive: '2026-01-15'
                      sites:
                      - {}
                      creationDate: '2026-01-15T10:30:00Z'
                      lastUpdateDate: '2026-01-15T10:30:00Z'
                    totalCount: 10
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /oe/salesOrders:
    get:
      operationId: getSalesOrders
      summary: Retrieve Sales Orders
      description: >-
        Retrieves Order Management sales order records. Maps to the
        OE_ORDER_HEADERS_ALL and OE_ORDER_LINES_ALL tables through the
        OE_ORDER_PUB PL/SQL API.
      tags:
      - Order Management
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: headerId
        in: query
        description: Order header identifier
        schema:
          type: integer
        example: '500123'
      - name: orderNumber
        in: query
        description: Order number
        schema:
          type: integer
        example: 10
      - name: customerId
        in: query
        description: Customer identifier (sold-to)
        schema:
          type: integer
        example: '500123'
      - name: flowStatusCode
        in: query
        description: Order flow status
        schema:
          type: string
          enum:
          - ENTERED
          - BOOKED
          - CLOSED
          - CANCELLED
        example: ENTERED
      - name: orderedDateFrom
        in: query
        description: Order date range start (YYYY-MM-DD)
        schema:
          type: string
          format: date
        example: '2026-01-15'
      - name: orderedDateTo
        in: query
        description: Order date range end (YYYY-MM-DD)
        schema:
          type: string
          format: date
        example: '2026-01-15'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of sales orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SalesOrder'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getsalesorders200Example:
                  summary: Default getSalesOrders 200 response
                  x-microcks-default: true
                  value:
                    items:
                    - headerId: '500123'
                      orderNumber: 10
                      orderedDate: '2026-01-15'
                      orderTypeId: '500123'
                      orderTypeName: example_value
                      soldToOrgId: '500123'
                      customerName: example_value
                      shipToOrgId: '500123'
                      invoiceToOrgId: '500123'
                      transactionalCurrCode: example_value
                      flowStatusCode: ENTERED
                      bookedFlag: 'Y'
                      totalAmount: 42.5
                      salesrepId: '500123'
                      lines:
                      - {}
                      orgId: '500123'
                      creationDate: '2026-01-15T10:30:00Z'
                      lastUpdateDate: '2026-01-15T10:30:00Z'
                    totalCount: 10
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createSalesOrder
      summary: Create a Sales Order
      description: >-
        Creates a new sales order using the OE_ORDER_PUB.PROCESS_ORDER
        PL/SQL API or the Order Import open interface.
      tags:
      - Order Management
      security:
      - tokenAuth: []
      - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderCreate'
            examples:
              CreatesalesorderRequestExample:
                summary: Default createSalesOrder request
                x-microcks-default: true
                value:
                  soldToOrgId: '500123'
                  orderTypeId: '500123'
                  orderedDate: '2026-01-15'
                  transactionalCurrCode: example_value
                  shipToOrgId: '500123'
                  invoiceToOrgId: '500123'
                  salesrepId: '500123'
                  lines:
                  - inventoryItemId: '500123'
                    orderedQuantity: 42.5
                    orderQuantityUom: example_value
                    unitSellingPrice: 42.5
                    scheduleShipDate: '2026-01-15'
      responses:
        '201':
          description: Sales order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
              examples:
                Createsalesorder201Example:
                  summary: Default createSalesOrder 201 response
                  x-microcks-default: true
                  value:
                    headerId: '500123'
                    orderNumber: 10
                    orderedDate: '2026-01-15'
                    orderTypeId: '500123'
                    orderTypeName: example_value
                    soldToOrgId: '500123'
                    customerName: example_value
                    shipToOrgId: '500123'
                    invoiceToOrgId: '500123'
                    transactionalCurrCode: example_value
                    flowStatusCode: ENTERED
                    bookedFlag: 'Y'
                    totalAmount: 42.5
                    salesrepId: '500123'
                    lines:
                    - lineId: '500123'
                      lineNumber: 10
                      orderedItem: example_value
                      inventoryItemId: '500123'
                      orderedQuantity: 42.5
                      orderQuantityUom: example_value
                      unitSellingPrice: 42.5
                      unitListPrice: 42.5
                      lineAmount: 42.5
                      scheduleShipDate: '2026-01-15'
                      actualShipDate: '2026-01-15'
                      flowStatusCode: example_value
                      shippedQuantity: 42.5
                    orgId: '500123'
                    creationDate: '2026-01-15T10:30:00Z'
                    lastUpdateDate: '2026-01-15T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /inv/items:
    get:
      operationId: getInventoryItems
      summary: Retrieve Inventory Items
      description: >-
        Retrieves Inventory item master records. Maps to the
        MTL_SYSTEM_ITEMS_B table through the Inventory Items API.
      tags:
      - Inventory
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: inventoryItemId
        in: query
        description: Inventory item identifier
        schema:
          type: integer
        example: '500123'
      - name: segment1
        in: query
        description: Item number
        schema:
          type: string
        example: example_value
      - name: organizationId
        in: query
        description: Inventory organization identifier
        schema:
          type: integer
        example: '500123'
      - name: itemType
        in: query
        description: Item type
        schema:
          type: string
        example: example_value
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of inventory items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryItem'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getinventoryitems200Example:
                  summary: Default getInventoryItems 200 response
                  x-microcks-default: true
                  value:
                    items:
                    - inventoryItemId: '500123'
                      segment1: example_value
                      description: A sample description.
                      longDescription: example_value
                      primaryUomCode: example_value
                      itemType: example_value
                      inventoryItemStatusCode: example_value
                      organizationId: '500123'
                      weightUomCode: example_value
                      unitWeight: 42.5
                      volumeUomCode: example_value
                      unitVolume: 42.5
                      listPrice: 42.5
                      purchasingEnabledFlag: 'Y'
                      customerOrderEnabledFlag: 'Y'
                      internalOrderEnabledFlag: 'Y'
                      creationDate: '2026-01-15T10:30:00Z'
                      lastUpdateDate: '2026-01-15T10:30:00Z'
                    totalCount: 10
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /inv/onhandQuantities:
    get:
      operationId: getOnhandQuantities
      summary: Retrieve On-hand Inventory Quantities
      description: >-
        Retrieves on-hand quantity information for inventory items. Maps to
        the MTL_ONHAND_QUANTITIES_DETAIL table.
      tags:
      - Inventory
      security:
      - tokenAuth: []
      - basicAuth: []
      parameters:
      - name: inventoryItemId
        in: query
        description: Inventory item identifier
        schema:
          type: integer
        example: '500123'
      - name: organizationId
        in: query
        description: Inventory organization identifier
        schema:
          type: integer
        example: '500123'
      - name: subinventoryCode
        in: query
        description: Subinventory code
        schema:
          type: string
        example: example_value
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: On-hand quantity records
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OnhandQuantity'
                  totalCount:
                    type: integer
                  hasMore:
                    type: boolean
              examples:
                Getonhandquantities200Example:
                  summary: Default getOnhandQuantities 200 response
                  x-microcks-default: true
                  value:
                    items:
                    - inventoryItemId: '500123'
                      organizationId: '500123'
                      subinventoryCode: example_value
                      locatorId: '500123'
                      lotNumber: example_value
                      serialNumber: example_value
                      transactionQuantity: 42.5
                      transactionUomCode: example_value
                      lastUpdateDate: '2026-01-15T10:30:00Z'
