naftiko: "1.0.0-alpha1"

info:
  label: "Oracle EBS Integration and EDI"
  description: "Integration capabilities combining ISG REST API for service management and e-Commerce Gateway for EDI document exchange with trading partners. Used by integration architects and B2B teams."
  tags:
    - Oracle
    - Integration
    - EDI
    - SOA Gateway
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      ORACLE_EBS_TOKEN: ORACLE_EBS_TOKEN
      ORACLE_EBS_USERNAME: ORACLE_EBS_USERNAME
      ORACLE_EBS_PASSWORD: ORACLE_EBS_PASSWORD

capability:
  consumes:
    - import: oracle-isg-rest
      location: ./shared/isg-rest.yaml
    - import: oracle-ecommerce-gateway
      location: ./shared/ecommerce-gateway.yaml

  exposes:
    - type: rest
      port: 8083
      namespace: integration-edi-api
      description: "Unified REST API for Oracle EBS integration and EDI."
      resources:
        - path: /v1/auth
          name: auth
          description: "Authentication."
          operations:
            - method: POST
              name: login
              description: "Authenticate."
              call: "oracle-isg-rest.login"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/trading-partners
          name: trading-partners
          description: "Trading partner management."
          operations:
            - method: GET
              name: get-trading-partners
              description: "List trading partners."
              call: "oracle-ecommerce-gateway.get-trading-partners"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/inbound-transactions
          name: inbound-transactions
          description: "Inbound EDI transactions."
          operations:
            - method: GET
              name: get-inbound-transactions
              description: "List inbound transactions."
              call: "oracle-ecommerce-gateway.get-inbound-transactions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/outbound-transactions
          name: outbound-transactions
          description: "Outbound EDI transactions."
          operations:
            - method: GET
              name: get-outbound-transactions
              description: "List outbound transactions."
              call: "oracle-ecommerce-gateway.get-outbound-transactions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9083
      namespace: integration-edi-mcp
      transport: http
      description: "MCP server for AI-assisted Oracle EBS integration and EDI."
      tools:
        - name: isg-login
          description: "Authenticate and obtain session token."
          hints:
            readOnly: false
          call: "oracle-isg-rest.login"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isg-logout
          description: "End the current session."
          hints:
            readOnly: false
          call: "oracle-isg-rest.logout"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isg-initialize
          description: "Initialize responsibility context."
          hints:
            readOnly: false
          call: "oracle-isg-rest.initialize"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isg-get-service-wadl
          description: "Get WADL for a REST service."
          hints:
            readOnly: true
          call: "oracle-isg-rest.get-service-wadl"
          with:
            service: "tools.service"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isg-invoke-rest-method
          description: "Invoke a REST method on a service."
          hints:
            readOnly: false
          call: "oracle-isg-rest.invoke-rest-method"
          with:
            service: "tools.service"
            method: "tools.method"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-get-trading-partners
          description: "Retrieve trading partners."
          hints:
            readOnly: true
            openWorld: true
          call: "oracle-ecommerce-gateway.get-trading-partners"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-get-trading-partner-by-id
          description: "Get trading partner by ID."
          hints:
            readOnly: true
          call: "oracle-ecommerce-gateway.get-trading-partner-by-id"
          with:
            tradingPartnerId: "tools.trading_partner_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-get-inbound-transactions
          description: "Retrieve inbound EDI transactions."
          hints:
            readOnly: true
          call: "oracle-ecommerce-gateway.get-inbound-transactions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-import-inbound-transaction
          description: "Import an inbound EDI transaction."
          hints:
            readOnly: false
          call: "oracle-ecommerce-gateway.import-inbound-transaction"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-get-outbound-transactions
          description: "Retrieve outbound EDI transactions."
          hints:
            readOnly: true
          call: "oracle-ecommerce-gateway.get-outbound-transactions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-extract-outbound-transaction
          description: "Extract an outbound EDI transaction."
          hints:
            readOnly: false
          call: "oracle-ecommerce-gateway.extract-outbound-transaction"
          outputParameters:
            - type: object
              mapping: "$."
        - name: edi-get-code-conversions
          description: "Retrieve code conversion mappings."
          hints:
            readOnly: true
          call: "oracle-ecommerce-gateway.get-code-conversions"
          outputParameters:
            - type: object
              mapping: "$."
